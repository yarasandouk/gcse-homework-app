<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash GCSE | Sign Up / Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <h1>Smash<span>GCSE</span></h1>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      <button class="tab" id="tab-login" onclick="showTab('login')">Log In</button>
    </div>

    <!-- SIGN UP FORM -->
    <form id="signup-form" class="form" onsubmit="handleSignup(event)">
      <p class="form-label">I am a...</p>
      <div class="role-selector">
        <label class="role-card">
          <input type="radio" name="role" value="student" checked />
          <div class="role-inner">
            <span class="role-icon">🎓</span>
            <span>Student</span>
          </div>
        </label>
        <label class="role-card">
          <input type="radio" name="role" value="teacher" />
          <div class="role-inner">
            <span class="role-icon">🏫</span>
            <span>Teacher</span>
          </div>
        </label>
      </div>

      <div class="field">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username" required />
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" minlength="6" required />
      </div>

      <p class="error-msg" id="signup-error"></p>
      <button type="submit" class="btn">Create Account</button>
    </form>

    <!-- LOG IN FORM -->
    <form id="login-form" class="form hidden" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Your password" required />
      </div>

      <p class="error-msg" id="login-error"></p>
      <button type="submit" class="btn">Log In</button>
    </form>
  </div>

  <script type="module" src="firebase.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    }
  </script>
</body>
</html>
