<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | Smash GCSE</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    main { max-width: 1100px; }
    .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
    .subject-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.2rem 0.8rem; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
    .subject-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .subject-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .subject-name { font-size: 0.85rem; font-weight: 600; }
    .homework-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .hw-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 1rem 1.2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .hw-info .hw-subject { font-weight: 700; font-size: 0.95rem; }
    .hw-info .hw-title { font-size: 0.85rem; color: rgba(255,255,255,0.55); margin-top: 0.2rem; }
    .hw-due { font-size: 0.78rem; background: rgba(255,213,0,0.12); color: #ffd54f; padding: 0.25rem 0.7rem; border-radius: 20px; white-space: nowrap; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">📚 Smash<span>GCSE</span></div>
    <div class="nav-right">
      <span id="username-display"></span>
      <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>
  </nav>
  <main>
    <div class="welcome">
      <h1>Welcome back, <span id="welcome-name">...</span> 👋</h1>
      <p>Keep up the great work on your revision!</p>
    </div>

    <p class="section-title">Subjects</p>
    <div class="subjects-grid">
      <div class="subject-card" data-subject="biology"><div class="subject-icon">🧬</div><div class="subject-name">Biology</div></div>
      <div class="subject-card" data-subject="chemistry"><div class="subject-icon">⚗️</div><div class="subject-name">Chemistry</div></div>
      <div class="subject-card" data-subject="physics"><div class="subject-icon">⚡</div><div class="subject-name">Physics</div></div>
      <div class="subject-card" data-subject="computerScience"><div class="subject-icon">💻</div><div class="subject-name">Computer Science</div></div>
    </div>

    <p class="section-title">Homework Due</p>
    <div class="homework-list" id="homework-list">
      <p class="empty">Loading...</p>
    </div>
  </main>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUserId = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      currentUserId = user.uid;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const { username, role } = snap.data();
        if (role === 'teacher') { window.location.href = 'teacher-dashboard.html'; return; }
        document.getElementById('username-display').textContent = username;
        document.getElementById('welcome-name').textContent = username;
      }
      loadHomework();
    });

    async function loadHomework() {
      const list = document.getElementById('homework-list');
      try {
        // Find which teacher this student belongs to
        const memberSnap = await getDocs(query(collection(db, 'classMemberships'), where('studentId', '==', currentUserId)));
        if (memberSnap.empty) {
          list.innerHTML = '<p class="empty">You haven\'t been added to a class yet — ask your teacher to add you.</p>';
          return;
        }
        const teacherId = memberSnap.docs[0].data().teacherId;

        // Load only homework from that teacher, sorted client-side
        const snap = await getDocs(query(collection(db, 'assignments'), where('teacherId', '==', teacherId)));
        if (snap.empty) { list.innerHTML = '<p class="empty">No homework assigned yet.</p>'; return; }

        const assignments = [];
        snap.forEach(d => assignments.push(d.data()));
        assignments.sort((a, b) => a.dueDate.localeCompare(b.dueDate));

        list.innerHTML = '';
        assignments.forEach(({ subject, title, dueDate }) => {
          const card  = document.createElement('div'); card.className  = 'hw-card';
          const info  = document.createElement('div'); info.className  = 'hw-info';
          const sub   = document.createElement('div'); sub.className   = 'hw-subject'; sub.textContent = subject;
          const ttl   = document.createElement('div'); ttl.className   = 'hw-title';   ttl.textContent = title;
          const due   = document.createElement('div'); due.className   = 'hw-due';     due.textContent = `Due ${dueDate}`;
          info.append(sub, ttl);
          card.append(info, due);
          list.appendChild(card);
        });
      } catch {
        list.innerHTML = '<p class="empty">Failed to load homework.</p>';
      }
    }

    document.querySelectorAll('.subject-card').forEach(card => {
      card.addEventListener('click', () => {
        window.location.href = `subject.html?subject=${card.dataset.subject}`;
      });
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
