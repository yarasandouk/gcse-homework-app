<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject | Smash GCSE</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    main { max-width: 1200px; }

    /* ── Page header ── */
    .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .back-btn { padding: 0.4rem 1rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: background 0.2s; text-decoration: none; display: inline-block; }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .page-header h2 { font-size: 1.5rem; font-weight: 800; }

    /* ── Progress panel ── */
    .panel { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 1.2rem 1.5rem; margin-bottom: 1rem; }
    .panel-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); margin-bottom: 1rem; }
    .progress-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 0.75rem 1rem; text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: #7eb8f7; }
    .stat-label { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 0.2rem; }
    .bar-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 0.4rem; }
    .bar-track { background: rgba(255,255,255,0.08); border-radius: 99px; height: 7px; }
    .bar-fill { background: linear-gradient(90deg, #7eb8f7, #0f3460); border-radius: 99px; height: 7px; transition: width 0.6s ease; }

    /* ── Activity panel ── */
    .activity-item { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.87rem; }
    .activity-item:last-child { border-bottom: none; }
    .badge { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 600; }
    .badge-green  { background: rgba(129,199,132,0.15); color: #81c784; }
    .badge-blue   { background: rgba(126,184,247,0.15); color: #7eb8f7; }
    .badge-yellow { background: rgba(255,213,0,0.12);   color: #ffd54f; }

    /* ── Two-column layout ── */
    .subject-layout { display: grid; grid-template-columns: 210px 1fr; gap: 1.5rem; align-items: start; }

    /* ── Sidebar ── */
    .sidebar { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.2rem; position: sticky; top: 80px; }
    .section-btn { width: 100%; text-align: left; padding: 0.7rem 1rem; background: transparent; border: none; color: rgba(255,255,255,0.6); border-radius: 8px; cursor: pointer; font-size: 0.87rem; font-weight: 600; transition: all 0.15s; display: flex; align-items: center; gap: 0.5rem; }
    .section-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .section-btn.active { background: rgba(126,184,247,0.15); color: #7eb8f7; }

    /* ── Content area ── */
    .content-area { min-height: 400px; }
    .content-header { margin-bottom: 1.2rem; }
    .content-header h3 { font-size: 1.15rem; font-weight: 800; }
    .content-header p { color: rgba(255,255,255,0.45); font-size: 0.83rem; margin-top: 0.25rem; }

    /* ── Need to Know ── */
    .topic-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
    .topic-card h4 { font-size: 0.95rem; font-weight: 700; color: #7eb8f7; margin-bottom: 0.8rem; }
    .topic-points { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    .topic-points li { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.87rem; color: rgba(255,255,255,0.8); line-height: 1.5; }
    .topic-points li::before { content: '→'; color: #7eb8f7; flex-shrink: 0; margin-top: 1px; }

    /* ── Flashcards ── */
    .flashcards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .flashcard { height: 155px; perspective: 1000px; cursor: pointer; }
    .flashcard-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.1rem; text-align: center; }
    .flashcard-front { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); }
    .flashcard-back  { background: rgba(126,184,247,0.1); border: 1px solid rgba(126,184,247,0.2); transform: rotateY(180deg); }
    .fc-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); margin-bottom: 0.4rem; }
    .fc-text  { font-size: 0.87rem; font-weight: 600; line-height: 1.4; }
    .flashcard-back .fc-text { color: #a8d4ff; }
    .fc-hint  { font-size: 0.7rem; color: rgba(255,255,255,0.25); margin-top: 0.4rem; }

    /* ── Quiz ── */
    .quiz-container { display: flex; flex-direction: column; gap: 1rem; }
    .quiz-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.2rem 1.4rem; }
    .q-num  { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-bottom: 0.3rem; }
    .q-text { font-size: 0.93rem; font-weight: 600; margin-bottom: 1rem; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.45rem; }
    .quiz-option { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.9rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; cursor: pointer; font-size: 0.87rem; transition: all 0.15s; user-select: none; }
    .quiz-option:hover { background: rgba(255,255,255,0.09); }
    .quiz-option.selected { border-color: #7eb8f7; background: rgba(126,184,247,0.1); }
    .quiz-option.correct  { border-color: #81c784; background: rgba(129,199,132,0.1); color: #81c784; }
    .quiz-option.wrong    { border-color: #e57373; background: rgba(229,115,115,0.08); color: #e57373; }
    .opt-letter { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .quiz-submit { padding: 0.7rem 2rem; background: #0f3460; color: #fff; border: none; border-radius: 8px; font-size: 0.93rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .quiz-submit:hover    { background: #1a4a7a; }
    .quiz-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .quiz-result { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .result-score { font-size: 2.8rem; font-weight: 800; color: #7eb8f7; }
    .result-label { color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-top: 0.3rem; }
    .retake-btn { margin-top: 1rem; padding: 0.55rem 1.4rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.87rem; transition: background 0.2s; }
    .retake-btn:hover { background: rgba(255,255,255,0.18); }

    /* ── Questions by Topic ── */
    .questions-topic { margin-bottom: 1.5rem; }
    .questions-topic h4 { font-size: 0.95rem; font-weight: 700; color: #7eb8f7; margin-bottom: 0.8rem; }
    .question-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 0.6rem; }
    .question-item p { font-size: 0.87rem; margin-bottom: 0.6rem; color: rgba(255,255,255,0.85); line-height: 1.5; }
    .show-answer-btn { padding: 0.3rem 0.75rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.55); border-radius: 6px; cursor: pointer; font-size: 0.77rem; font-weight: 600; transition: all 0.15s; }
    .show-answer-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .answer-box { margin-top: 0.75rem; padding: 0.75rem 1rem; background: rgba(126,184,247,0.06); border-left: 3px solid #7eb8f7; border-radius: 0 6px 6px 0; font-size: 0.84rem; color: rgba(255,255,255,0.75); line-height: 1.6; }

    /* ── Past Papers ── */
    .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 1rem; }
    .paper-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1.2rem; text-decoration: none; color: #fff; transition: all 0.2s; display: block; }
    .paper-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .paper-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .paper-name { font-weight: 700; font-size: 0.9rem; }
    .paper-desc { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 0.3rem; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .subject-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; flex-direction: row; flex-wrap: wrap; }
      .section-btn { flex: 1; min-width: 110px; justify-content: center; }
      .progress-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">📚 Smash<span>GCSE</span></div>
    <div class="nav-right">
      <span id="username-display"></span>
      <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <a class="back-btn" href="student-dashboard.html">← All Subjects</a>
      <h2 id="subject-title"></h2>

    <!-- Progress -->
    <div class="panel">

      <div class="progress-stats" id="progress-stats"></div>

      <div class="bar-track"><div class="bar-fill" id="overall-bar" style="width:0%"></div></div>
    </div>

    <!-- Activity -->
    <div class="panel" style="margin-bottom:1.5rem">
      <div class="panel-title">Activity</div>
      <div id="activity-list"><p class="empty" style="font-size:0.85rem">No activity yet — start revising below!</p></div>

    <!-- Sidebar + Content -->
    <div class="subject-layout">
      <nav class="sidebar">
        <button class="section-btn active" data-section="need-to-know">📋 Content</button>

        <button class="section-btn" data-section="quiz">✅ Quiz</button>
        <button class="section-btn" data-section="questions-by-topic">📝 Questions by Topic</button>
        <button class="section-btn" data-section="past-papers">📄 Past Papers</button>
      </nav>
      <div class="content-area" id="content-area"></div>
    </div>
  </main>

    // ── Progress ──────────────────────────────────────────────────────────────
    async function loadProgress() {
      const snap = await getDoc(doc(db, 'progress', `${currentUser.uid}_${subjectKey}`));
      progressData = snap.exists() ? snap.data() : {};
      renderProgress();
    }

    async function saveProgress(updates) {
      const ref = doc(db, 'progress', `${currentUser.uid}_${subjectKey}`);
      await setDoc(ref, { userId: currentUser.uid, subject: subjectKey, ...updates }, { merge: true });
      progressData = { ...progressData, ...updates };
      renderProgress();
    }

    async function markViewed(key) {
      if (!progressData[key]?.viewed) {
        await saveProgress({ [key]: { viewed: true, lastViewed: new Date().toISOString() } });
      }
    }

    async function loadTeacherContent() {
      const [fcSnap, quizSnap, noteSnap, examSnap] = await Promise.all([
        getDocs(query(collection(db, 'flashcards'),    where('subject', '==', subjectKey))),
        getDocs(query(collection(db, 'quizQuestions'), where('subject', '==', subjectKey))),
        getDocs(query(collection(db, 'notePoints'),    where('subject', '==', subjectKey))),
        getDocs(query(collection(db, 'examQuestions'), where('subject', '==', subjectKey)))
      ]);

      fcSnap.forEach(d   => { const { front, back } = d.data(); teacherContent.flashcards.push({ front, back }); });
      quizSnap.forEach(d => { const { question, options, correct } = d.data(); teacherContent.quiz.push({ question, options, correct }); });

      const notesByTopic = {};
      noteSnap.forEach(d => {
        const { topic, point } = d.data();
        if (!notesByTopic[topic]) notesByTopic[topic] = [];
        notesByTopic[topic].push(point);
      });
      Object.entries(notesByTopic).forEach(([title, points]) => teacherContent.needToKnow.push({ title, points }));

      const examsByTopic = {};
      examSnap.forEach(d => {
        const { topic, question, answer } = d.data();
        if (!examsByTopic[topic]) examsByTopic[topic] = [];
        examsByTopic[topic].push({ q: question, a: answer });
      });
      Object.entries(examsByTopic).forEach(([topic, questions]) => teacherContent.questionsByTopic.push({ topic, questions }));
    }

    // Returns true if a content item is relevant to the student's preferences.
    // Items with no tags are shown to everyone.
    function isRelevant(item) {
      if (!studentPrefs) return true;
      const tags = item.tags || [];
      const scienceTags = tags.filter(t => t === 'combined' || t === 'triple');
      const tierTags    = tags.filter(t => t === 'higher'   || t === 'foundation');
      const scienceOk   = scienceTags.length === 0 || scienceTags.includes(studentPrefs.scienceType);
      const tierOk      = tierTags.length    === 0 || tierTags.includes(studentPrefs.tier);
      return scienceOk && tierOk;
    }

    function getAllContent(key) {
      const all = [
        ...(subjectData[key]   || []),
        ...(EXTRA_CONTENT[subjectKey]?.[key] || []),
        ...(teacherContent[key] || [])
      ];
      return all.filter(isRelevant);
    }

    function renderProgress() {
      const flashTotal  = getAllContent('flashcards').length;
      const flashDone   = progressData.flashcards?.completed || 0;
      const quizScore   = progressData.quiz?.score ?? null;
      const visited     = ['needToKnow', 'questionsByTopic', 'pastPapers'].filter(k => progressData[k]?.viewed).length;

      // Stat cards
      const statsEl = document.getElementById('progress-stats');
      statsEl.innerHTML = '';
      [
        { value: `${flashDone}/${flashTotal}`, label: 'Flashcards flipped' },
        { value: quizScore !== null ? `${quizScore}%` : '—', label: 'Best quiz score' },
        { value: `${visited}/3`, label: 'Topics visited' }
      ].forEach(({ value, label }) => {
        const card = document.createElement('div'); card.className = 'stat-card';
        const val  = document.createElement('div'); val.className = 'stat-value'; val.textContent = value;
        const lbl  = document.createElement('div'); lbl.className = 'stat-label'; lbl.textContent = label;
        card.append(val, lbl);
        statsEl.appendChild(card);
      });

      // Overall bar
      const total  = flashTotal + 100 + 3;
      const earned = flashDone + (quizScore || 0) + visited;
      const pct    = Math.round((earned / total) * 100);
      document.getElementById('overall-pct').textContent = `${pct}%`;
      document.getElementById('overall-bar').style.width  = `${pct}%`;

      // Activity list
      const activities = [];
      const p = progressData;
      if (p.needToKnow?.viewed)       activities.push({ icon: '📋', name: 'Content',        badge: 'Viewed',   cls: 'badge-blue',   date: p.needToKnow.lastViewed });
      if (p.flashcards?.completed)    activities.push({ icon: '🃏', name: `Flashcards (${p.flashcards.completed}/${flashTotal})`, badge: p.flashcards.completed >= flashTotal ? 'All done!' : 'In progress', cls: p.flashcards.completed >= flashTotal ? 'badge-green' : 'badge-yellow', date: p.flashcards.lastAttempted });
      if (p.quiz?.attempts)           activities.push({ icon: '✅', name: 'Quiz',                 badge: `${p.quiz.score}% · ${p.quiz.attempts} attempt${p.quiz.attempts > 1 ? 's' : ''}`, cls: p.quiz.score >= 80 ? 'badge-green' : 'badge-yellow', date: p.quiz.lastAttempted });
      if (p.questionsByTopic?.viewed) activities.push({ icon: '📝', name: 'Questions by Topic',   badge: 'Viewed',   cls: 'badge-blue',   date: p.questionsByTopic.lastViewed });
      if (p.pastPapers?.viewed)       activities.push({ icon: '📄', name: 'Past Papers',          badge: 'Viewed',   cls: 'badge-blue',   date: p.pastPapers.lastViewed });

      const actEl = document.getElementById('activity-list');
      if (!activities.length) {
        actEl.innerHTML = '<p class="empty" style="font-size:0.85rem">No activity yet — start revising below!</p>';
      } else {
        activities.sort((a, b) => new Date(b.date) - new Date(a.date));
        actEl.innerHTML = '';
        activities.forEach(({ icon, name, badge, cls }) => {
          const row   = document.createElement('div'); row.className = 'activity-item';
          const nameEl = document.createElement('span'); nameEl.textContent = `${icon}  ${name}`;
          const bdg   = document.createElement('span'); bdg.className = `badge ${cls}`; bdg.textContent = badge;
          row.append(nameEl, bdg);
          actEl.appendChild(row);
        });
      }
    }

    // ── Sidebar navigation ────────────────────────────────────────────────────
    document.querySelectorAll('.section-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentSection = btn.dataset.section;
        flippedCards   = new Set();
        quizState      = { answers: {}, submitted: false };
        document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderContent();
        const viewMap = { 'need-to-know': 'needToKnow', 'questions-by-topic': 'questionsByTopic', 'past-papers': 'pastPapers' };
        if (viewMap[currentSection]) markViewed(viewMap[currentSection]);
      });
    });

    // ── Renderers ─────────────────────────────────────────────────────────────
    function renderContent() {
      const area = document.getElementById('content-area');
      area.innerHTML = '';
      if (currentSection === 'need-to-know')        renderNeedToKnow(area);
      else if (currentSection === 'flashcards')      renderFlashcards(area);
      else if (currentSection === 'quiz')            renderQuiz(area);
      else if (currentSection === 'questions-by-topic') renderQuestionsByTopic(area);
      else if (currentSection === 'past-papers')     renderPastPapers(area);
    }

    function makeHeader(h3Text, pText) {
      const hdr = document.createElement('div'); hdr.className = 'content-header';
      const h3  = document.createElement('h3'); h3.textContent = h3Text;
      const p   = document.createElement('p');  p.textContent  = pText;
      hdr.append(h3, p);
      return hdr;
    }

    function renderNeedToKnow(area) {
      area.appendChild(makeHeader('📋 Content', `Key facts and concepts for ${subjectData.name}`));
      getAllContent('needToKnow').forEach(({ title, points }) => {
        const card = document.createElement('div'); card.className = 'topic-card';
        const h4   = document.createElement('h4'); h4.textContent = title;
        const ul   = document.createElement('ul'); ul.className = 'topic-points';
        points.forEach(pt => { const li = document.createElement('li'); li.textContent = pt; ul.appendChild(li); });
        card.append(h4, ul);
        area.appendChild(card);
      });
    }

    function renderFlashcards(area) {
      area.appendChild(makeHeader('🃏 Flashcards', 'Click a card to flip it and reveal the answer'));
      const grid = document.createElement('div'); grid.className = 'flashcards-grid';
      getAllContent('flashcards').forEach((card, i) => {
        const el    = document.createElement('div'); el.className = `flashcard${flippedCards.has(i) ? ' flipped' : ''}`;
        const inner = document.createElement('div'); inner.className = 'flashcard-inner';

        const front = document.createElement('div'); front.className = 'flashcard-front';
        const fLbl  = document.createElement('div'); fLbl.className = 'fc-label'; fLbl.textContent = 'Question';
        const fTxt  = document.createElement('div'); fTxt.className = 'fc-text';  fTxt.textContent = card.front;
        const hint  = document.createElement('div'); hint.className = 'fc-hint';  hint.textContent = 'Tap to reveal';
        front.append(fLbl, fTxt, hint);

        const back  = document.createElement('div'); back.className = 'flashcard-back';
        const bLbl  = document.createElement('div'); bLbl.className = 'fc-label'; bLbl.textContent = 'Answer';
        const bTxt  = document.createElement('div'); bTxt.className = 'fc-text';  bTxt.textContent = card.back;
        back.append(bLbl, bTxt);

        inner.append(front, back);
        el.appendChild(inner);
        el.addEventListener('click', async () => {
          el.classList.toggle('flipped');
          flippedCards.has(i) ? flippedCards.delete(i) : flippedCards.add(i);
          await saveProgress({ flashcards: { completed: flippedCards.size, total: getAllContent('flashcards').length, lastAttempted: new Date().toISOString() } });
        });
        grid.appendChild(el);
      });
      area.appendChild(grid);
    }

    function renderQuiz(area) {
      area.innerHTML = '';
      area.appendChild(makeHeader('✅ Quiz', 'Answer all questions then hit Submit'));
      const container = document.createElement('div'); container.className = 'quiz-container';
      const letters   = ['A', 'B', 'C', 'D'];

      getAllContent('quiz').forEach((q, qi) => {
        const card  = document.createElement('div'); card.className = 'quiz-card';
        const qNum  = document.createElement('div'); qNum.className = 'q-num';  qNum.textContent = `Question ${qi + 1} of ${getAllContent('quiz').length}`;
        const qText = document.createElement('div'); qText.className = 'q-text'; qText.textContent = q.question;
        const opts  = document.createElement('div'); opts.className = 'quiz-options';

        q.options.forEach((opt, oi) => {
          const o   = document.createElement('div'); o.className = 'quiz-option';
          if (quizState.answers[qi] === oi) o.classList.add('selected');
          if (quizState.submitted) {
            if (oi === q.correct)              o.classList.add('correct');
            else if (quizState.answers[qi] === oi) o.classList.add('wrong');
          }
          const ltr = document.createElement('span'); ltr.className = 'opt-letter'; ltr.textContent = letters[oi];
          const txt = document.createElement('span'); txt.textContent = opt;
          o.append(ltr, txt);
          if (!quizState.submitted) o.addEventListener('click', () => { quizState.answers[qi] = oi; renderQuiz(area); });
          opts.appendChild(o);
        });
        card.append(qNum, qText, opts);
        container.appendChild(card);
      });

      if (!quizState.submitted) {
        const answered = Object.keys(quizState.answers).length;
        const btn = document.createElement('button'); btn.className = 'quiz-submit';
        btn.textContent = `Submit Quiz (${answered}/${getAllContent('quiz').length} answered)`;
        btn.disabled = answered < getAllContent('quiz').length;
        btn.addEventListener('click', async () => {
          quizState.submitted = true;
          const correct = getAllContent('quiz').filter((q, i) => quizState.answers[i] === q.correct).length;
          const score   = Math.round((correct / getAllContent('quiz').length) * 100);
          const prev    = progressData.quiz?.score || 0;
          await saveProgress({ quiz: { score: Math.max(score, prev), attempts: (progressData.quiz?.attempts || 0) + 1, lastAttempted: new Date().toISOString() } });
          renderQuiz(area);
        });
        container.appendChild(btn);
      } else {
        const correct = getAllContent('quiz').filter((q, i) => quizState.answers[i] === q.correct).length;
        const score   = Math.round((correct / getAllContent('quiz').length) * 100);
        const result  = document.createElement('div'); result.className = 'quiz-result';
        const scoreEl = document.createElement('div'); scoreEl.className = 'result-score'; scoreEl.textContent = `${score}%`;
        const lbl     = document.createElement('div'); lbl.className = 'result-label'; lbl.textContent = `${correct} out of ${getAllContent('quiz').length} correct`;
        const retake  = document.createElement('button'); retake.className = 'retake-btn'; retake.textContent = 'Retake Quiz';
        retake.addEventListener('click', () => { quizState = { answers: {}, submitted: false }; renderQuiz(area); });
        result.append(scoreEl, lbl, retake);
        container.appendChild(result);
      }
      area.appendChild(container);
    }

    function renderQuestionsByTopic(area) {
      area.appendChild(makeHeader('📝 Questions by Topic', 'Attempt each question, then reveal the model answer'));
      getAllContent('questionsByTopic').forEach(({ topic, questions }) => {
        const sec = document.createElement('div'); sec.className = 'questions-topic';
        const h4  = document.createElement('h4'); h4.textContent = topic;
        sec.appendChild(h4);
        questions.forEach(({ q, a }) => {
          const item = document.createElement('div'); item.className = 'question-item';
          const qEl  = document.createElement('p');   qEl.textContent = q;
          const btn  = document.createElement('button'); btn.className = 'show-answer-btn'; btn.textContent = 'Show answer';
          const ans  = document.createElement('div'); ans.className = 'answer-box hidden'; ans.textContent = a;
          btn.addEventListener('click', () => {
            const showing = !ans.classList.contains('hidden');
            ans.classList.toggle('hidden', showing);
            btn.textContent = showing ? 'Show answer' : 'Hide answer';
          });
          item.append(qEl, btn, ans);
          sec.appendChild(item);
        });
        area.appendChild(sec);
      });
    }

    function renderPastPapers(area) {
      area.appendChild(makeHeader('📄 Past Papers', 'Check with your teacher which exam board you sit'));
      const grid = document.createElement('div'); grid.className = 'papers-grid';
      subjectData.pastPapers.forEach(({ board, desc, url }) => {
        const a    = document.createElement('a'); a.className = 'paper-card'; a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
        const icon = document.createElement('div'); icon.className = 'paper-icon'; icon.textContent = '📄';
        const name = document.createElement('div'); name.className = 'paper-name'; name.textContent = board;
        const dsc  = document.createElement('div'); dsc.className  = 'paper-desc'; dsc.textContent  = desc;
        a.append(icon, name, dsc);
        grid.appendChild(a);
      });
      area.appendChild(grid);
    }

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
